<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div id="header"></div>

<main>

<div id="item-page">

    <div id="item-images"></div>

    <div id="item-info">
        <h1 id="item-title"></h1>
        <p id="item-location"><i class="bi bi-geo-alt"></i></p>

        <p id="item-price"></p>

        <div id="item-meta">
            <p id="item-category"></p>
            <p id="item-condition"></p>
        </div>

        <h3 for="item-description" class="default-for">Description:</h3>
        <p id="item-description"></p>
    </div>

</div>

</main>

<div id="footer"></div>

<script src="../js/include.js"></script>
<script src="../js/item.js"></script>

</body>
</html>
